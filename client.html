<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO Клиент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .status.connected {
            background: #4caf50;
            color: white;
        }
        
        .status.disconnected {
            background: #f44336;
            color: white;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .message-area {
            background: #f8f9fa;
            border-radius: 5px;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .message {
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 5px;
            background: white;
            border-left: 3px solid #667eea;
        }
        
        .message .time {
            font-size: 11px;
            color: #999;
            margin-right: 10px;
        }
        
        .message .sender {
            font-weight: bold;
            color: #667eea;
        }
        
        .message.system {
            background: #fff3cd;
            border-left-color: #ffc107;
            color: #856404;
        }
        
        .info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .info strong {
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Socket.IO Клиент-Сервер</h1>
            <div id="statusBadge" class="status disconnected">⚫ Отключено</div>
        </div>
        
        <div class="main-content">
            <!-- Левая панель: Подключение и тесты -->
            <div class="card">
                <h2>🔌 Управление соединением</h2>
                <div class="controls">
                    <button onclick="connectSocket()">🔗 Подключиться</button>
                    <button onclick="disconnectSocket()">❌ Отключиться</button>
                    <button onclick="testPing()">🏓 Test Ping/Pong</button>
                </div>
                
                <div class="info" id="connectionInfo">
                    <strong>Статус:</strong> Не подключен<br>
                    <strong>ID клиента:</strong> -<br>
                    <strong>Сервер:</strong> -
                </div>
                
                <h2>📤 Отправить сообщение</h2>
                <div class="controls">
                    <input type="text" id="messageInput" placeholder="Введите ваше сообщение..." 
                           onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()">📨 Отправить</button>
                </div>
            </div>
            
            <!-- Правая панель: Лог сообщений -->
            <div class="card">
                <h2>📋 Лог соединения</h2>
                <div class="controls">
                    <button onclick="clearLogs()">🗑️ Очистить лог</button>
                    <button onclick="exportLogs()">💾 Экспорт лога</button>
                </div>
                <div id="messageLog" class="message-area">
                    <div class="message system">
                        <span class="time">[Система]</span>
                        Нажмите "Подключиться" для начала
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Подключаем Socket.IO клиент -->
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        let socket = null;
        let isConnected = false;
        
        // Функция добавления сообщения в лог
        function addMessage(message, type = 'normal') {
            const logDiv = document.getElementById('messageLog');
            const messageElement = document.createElement('div');
            messageElement.className = `message ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            messageElement.innerHTML = `<span class="time">[${timestamp}]</span> ${message}`;
            
            logDiv.appendChild(messageElement);
            messageElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // Обновление статуса подключения
        function updateStatus(connected, clientId = null) {
            isConnected = connected;
            const statusBadge = document.getElementById('statusBadge');
            const infoDiv = document.getElementById('connectionInfo');
            
            if (connected) {
                statusBadge.className = 'status connected';
                statusBadge.innerHTML = '🟢 Подключено';
                infoDiv.innerHTML = `
                    <strong>Статус:</strong> Подключен<br>
                    <strong>ID клиента:</strong> ${clientId || 'Загрузка...'}<br>
                    <strong>Сервер:</strong> http://localhost:3000
                `;
            } else {
                statusBadge.className = 'status disconnected';
                statusBadge.innerHTML = '⚫ Отключено';
                infoDiv.innerHTML = `
                    <strong>Статус:</strong> Не подключен<br>
                    <strong>ID клиента:</strong> -<br>
                    <strong>Сервер:</strong> -
                `;
            }
        }
        
        // Подключение к серверу
        function connectSocket() {
            if (socket && isConnected) {
                addMessage('Уже подключено к серверу!', 'system');
                return;
            }
            
            addMessage('🔄 Подключение к серверу...', 'system');
            
            // Создаем новое соединение
            socket = io('http://localhost:3000', {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000
            });
            
            // Обработчики событий
            socket.on('connect', () => {
                console.log('Подключено к серверу');
                addMessage(`✅ Успешно подключено к серверу! ID: ${socket.id}`, 'system');
                updateStatus(true, socket.id);
            });
            
            socket.on('welcome', (data) => {
                console.log('Получено приветствие:', data);
                addMessage(`👋 ${data.message} (${data.timestamp})`, 'system');
            });
            
            socket.on('message_received', (data) => {
                console.log('Подтверждение:', data);
                addMessage(`✅ Сообщение получено сервером (${data.timestamp})`, 'system');
            });
            
            socket.on('server_message', (data) => {
                console.log('Сообщение от сервера:', data);
                addMessage(`📨 ${data.from}: ${data.message} (${data.timestamp})`);
            });
            
            socket.on('user_joined', (data) => {
                console.log('Пользователь присоединился:', data);
                addMessage(`👥 ${data.message} (${data.timestamp})`, 'system');
            });
            
            socket.on('user_left', (data) => {
                console.log('Пользователь отключился:', data);
                addMessage(`👋 ${data.message} (${data.timestamp})`, 'system');
            });
            
            socket.on('pong', (data) => {
                console.log('Pong получен:', data);
                addMessage(`🏓 Получен Pong от сервера (${data.timestamp})`, 'system');
            });
            
            socket.on('disconnect', (reason) => {
                console.log('Отключено от сервера:', reason);
                addMessage(`❌ Отключено от сервера: ${reason}`, 'system');
                updateStatus(false);
            });
            
            socket.on('connect_error', (error) => {
                console.error('Ошибка подключения:', error);
                addMessage(`⚠️ Ошибка подключения: ${error.message}`, 'system');
                updateStatus(false);
            });
        }
        
        // Отключение от сервера
        function disconnectSocket() {
            if (socket && isConnected) {
                socket.disconnect();
                addMessage('🔌 Отключение от сервера...', 'system');
                updateStatus(false);
            } else {
                addMessage('Нет активного подключения', 'system');
            }
        }
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) {
                addMessage('⚠️ Введите сообщение для отправки', 'system');
                return;
            }
            
            if (!socket || !isConnected) {
                addMessage('⚠️ Нет подключения к серверу', 'system');
                return;
            }
            
            console.log('Отправка сообщения:', message);
            socket.emit('client_message', { message: message });
            addMessage(`✏️ Вы: ${message} (отправлено)`);
            
            input.value = '';
            input.focus();
        }
        
        // Тест ping/pong
        function testPing() {
            if (!socket || !isConnected) {
                addMessage('⚠️ Нет подключения к серверу', 'system');
                return;
            }
            
            addMessage('🏓 Отправка Ping...', 'system');
            socket.emit('ping');
        }
        
        // Очистка лога
        function clearLogs() {
            const logDiv = document.getElementById('messageLog');
            logDiv.innerHTML = '<div class="message system"><span class="time">[Система]</span> Лог очищен</div>';
            addMessage('Лог сообщений очищен', 'system');
        }
        
        // Экспорт лога
        function exportLogs() {
            const messages = [];
            const logEntries = document.querySelectorAll('#messageLog .message');
            
            logEntries.forEach(entry => {
                messages.push(entry.innerText);
            });
            
            const logText = messages.join('\n');
            const blob = new Blob([logText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `socket-log-${new Date().toISOString()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            addMessage('💾 Лог экспортирован в файл', 'system');
        }
        
        // Автоподключение при загрузке страницы
        window.addEventListener('load', () => {
            addMessage('🌟 Страница загружена. Нажмите "Подключиться" для начала', 'system');
            // Раскомментируйте для автоматического подключения:
            // setTimeout(connectSocket, 1000);
        });
    </script>
</body>
</html>
